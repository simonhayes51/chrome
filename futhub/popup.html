<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="theme.css">
  <style>
    body { width: 320px; padding: 16px; margin: 0; }
    .popup-header { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      margin-bottom: 16px; 
      padding-bottom: 12px;
      border-bottom: 1px solid var(--outline);
    }
    .popup-header img { width: 24px; height: 24px; border-radius: 4px; }
    .popup-header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .status-row { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      margin: 12px 0; 
    }
    .premium-banner {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
      text-align: center;
    }
    .premium-banner.active {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-color: rgba(16, 185, 129, 0.3);
    }
    .premium-banner h3 {
      margin: 0 0 4px 0;
      font-size: 14px;
      font-weight: 600;
      color: #000;
    }
    .premium-banner p {
      margin: 0;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.8);
    }
    .btn-small { 
      padding: 6px 12px; 
      font-size: 12px; 
      border-radius: 6px; 
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-row .btn {
      flex: 1;
    }
    .crown-icon {
      display: inline-block;
      font-size: 14px;
      margin-right: 4px;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg">
  <div class="popup-header">
    <img src="icons/icon32.png" alt="Logo">
    <h1>FUT Trader Hub</h1>
  </div>

  <div class="status-row">
    <span>Extension Status:</span>
    <span id="statusPill" class="pill off">Checking...</span>
  </div>

  <div id="premiumStatus" class="premium-banner" style="display: none;">
    <h3 id="premiumTitle">Premium Required</h3>
    <p id="premiumMessage">The Chrome extension requires a Premium subscription.</p>
  </div>

  <div id="loadingState" class="loading" style="display: none;">
    <p style="text-align: center; color: var(--muted); font-size: 12px;">
      Checking premium status...
    </p>
  </div>

  <div class="btn-row">
    <button id="quickLogin" class="btn btn-small primary">
      <span id="loginText">Connect</span>
    </button>
    <button id="openOptions" class="btn btn-small">Settings</button>
  </div>

  <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--outline);">
    <p class="hint" style="margin: 0; text-align: center;">
      Auto-logs sold items from FUT Web App to your dashboard
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
